<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login | FinTrack Pro</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="auth.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>

                FinTrack Pro

            </h1>

            <p>

                Manage your money like a pro.

            </p>





            <!-- LOGIN -->

            <form
                id="loginForm">

                <h2>

                    Welcome Back

                </h2>

                <div class="form-group">

                    <label>

                        Username

                    </label>

                    <input
                        type="text"
                        id="loginUsername"
                        required>

                </div>

                <div class="form-group">

                    <label>

                        Password

                    </label>

                    <input
                        type="password"
                        id="loginPassword"
                        required>

                </div>

                <button
                    type="submit">

                    Login

                </button>

                <p
                    class="switch-text">

                    Don't have an account?

                    <span
                        id="showRegister">

                        Register

                    </span>

                </p>

            </form>





            <!-- REGISTER -->

            <form
                id="registerForm"
                class="hidden">

                <h2>

                    Create Account

                </h2>

                <div class="form-group">

                    <label>

                        Username

                    </label>

                    <input
                        type="text"
                        id="registerUsername"
                        required>

                </div>

                <div class="form-group">

                    <label>

                        Password

                    </label>

                    <input
                        type="password"
                        id="registerPassword"
                        required>

                </div>

                <div class="form-group">

                    <label>

                        Confirm Password

                    </label>

                    <input
                        type="password"
                        id="confirmPassword"
                        required>

                </div>

                <button
                    type="submit">

                    Register

                </button>

                <p
                    class="switch-text">

                    Already have an account?

                    <span
                        id="showLogin">

                        Login

                    </span>

                </p>

            </form>

        </div>

    </div>

    <script src="auth.js"></script>

</body>

</html>
